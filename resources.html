  document.getElementById('nav-home').textContent=t('nh');document.getElementById('nav-learn').textContent=t('nl');document.getElementById('nav-resources').textContent=t('nr');document.getElementById('nav-budget').textContent=t('nb');
  document.getElementById('lang-current').textContent=LANGS[currentLang].code;
  document.getElementById('lang-modal-title').textContent=t('lt');
  document.getElementById('lang-list').innerHTML=LANG_ORDER.map(lk=>{const l=LANGS[lk];return `<div class="lang-option ${lk===currentLang?'active':''}" onclick="selectLang('${lk}')"><div class="lang-option-left"><div class="lang-native">${l.native}</div><div class="lang-english">${l.english}</div></div><div class="lang-check">✓</div></div>`;}).join('');
}
function openLang(){document.getElementById('lang-overlay').classList.add('open');}
function closeLang(){document.getElementById('lang-overlay').classList.remove('open');}
function handleLangOverlay(e){if(e.target===document.getElementById('lang-overlay'))closeLang();}
function selectLang(lk){currentLang=lk;localStorage.setItem('bloom_lang',lk);applyLang();closeLang();}

const hour=new Date().getHours(),mins=new Date().getMinutes(),timeDecimal=hour+mins/60;
document.body.classList.add(hour<12?'theme-morning':hour<17?'theme-afternoon':'theme-evening');
const RISE=6,SET=20,isDay=timeDecimal>=RISE&&timeDecimal<SET;
let progress=isDay?(timeDecimal-RISE)/(SET-RISE):(()=>{const nd=24-(SET-RISE),nt=timeDecimal>=SET?timeDecimal-SET:timeDecimal+(24-SET);return nt/nd;})();
const ang=Math.PI-progress*Math.PI;
document.getElementById('sky-body').setAttribute('transform',`translate(${170+150*Math.cos(ang)},${48-42*Math.sin(ang)})`);
const circle=document.getElementById('sky-circle'),glow=document.getElementById('sky-glow'),rays=document.getElementById('sun-rays'),moonDetail=document.getElementById('moon-detail'),stars=document.getElementById('stars'),arcPath=document.getElementById('arc-path'),horizonLine=document.getElementById('horizon-line');
if(isDay){const edge=progress<0.15||progress>0.85;circle.setAttribute('fill',edge?'#ce9042':'#c8b067');glow.setAttribute('fill',edge?'#f5d4a0':'#e8d898');rays.setAttribute('stroke',edge?'#ce9042':'#c8b067');rays.style.opacity='1';moonDetail.style.opacity='0';stars.style.opacity='0';arcPath.setAttribute('stroke','#c8b067');horizonLine.setAttribute('stroke','#c8b067');}
else{circle.setAttribute('fill','#edddc5');glow.setAttribute('fill','#c8b067');rays.style.opacity='0';moonDetail.style.opacity='1';stars.style.opacity='1';arcPath.setAttribute('stroke','#9ab08d');horizonLine.setAttribute('stroke','#9ab08d');}

const UW_CENTER=[47.6553,-122.3035];
const resources={food:{latlng:[47.6599,-122.3152],color:'#274133',tag:'Food support',tagBg:'rgba(154,176,141,0.2)',tagColor:'#274133',name:'UW Food Pantry',desc:'Free groceries, fresh produce, and pantry staples for UW students in need.',hours:'Mon–Fri · Hours vary by quarter',link:'https://www.washington.edu/anyhungryhusky/',linkLabel:'Visit →'},advising:{latlng:[47.6561,-122.3082],color:'#9ab08d',tag:'Academic advising',tagBg:'rgba(154,176,141,0.2)',tagColor:'#274133',name:'UAA Undergraduate Advising',desc:'Academic planning, degree requirements, and support for all UW undergrads.',hours:'Mon–Fri 8am–5pm',link:'https://www.washington.edu/uaa/',linkLabel:'Visit →'},financialaid:{latlng:[47.6532,-122.3082],color:'#ce9042',tag:'Financial aid',tagBg:'rgba(206,144,66,0.18)',tagColor:'#7a4010',name:'Office of Student Financial Aid',desc:'Help with FAFSA, scholarships, grants, loans, and work-study.',hours:'Mon–Fri 11am–3pm',link:'https://www.washington.edu/financialaid/',linkLabel:'Visit →'}};
const makeIcon=c=>L.divIcon({className:'',html:`<svg width="28" height="38" viewBox="0 0 28 38" xmlns="http://www.w3.org/2000/svg"><circle cx="14" cy="14" r="13" fill="${c}" stroke="white" stroke-width="2.5"/><circle cx="14" cy="14" r="5" fill="white"/><polygon points="14,38 6,24 22,24" fill="${c}"/></svg>`,iconSize:[28,38],iconAnchor:[14,38],popupAnchor:[0,-40]});
const makePopup=r=>`<div class="popup-inner"><div class="popup-tag" style="background:${r.tagBg};color:${r.tagColor};">${r.tag}</div><div class="popup-name">${r.name}</div><div class="popup-desc">${r.desc}</div><div class="popup-hours">🕐 ${r.hours}</div><a class="popup-link" href="${r.link}" target="_blank">${r.linkLabel}</a></div>`;
const miniMap=L.map('map',{center:UW_CENTER,zoom:15,zoomControl:false,scrollWheelZoom:false,dragging:false,doubleClickZoom:false,touchZoom:false});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap contributors'}).addTo(miniMap);
Object.entries(resources).forEach(([k,r])=>L.marker(r.latlng,{icon:makeIcon(r.color)}).addTo(miniMap).bindPopup(makePopup(r),{className:'roots-popup',maxWidth:240}));
let fullMap=null,fullMarkers={};
function initFullMap(){if(fullMap)return;fullMap=L.map('map-full',{center:UW_CENTER,zoom:16,zoomControl:true});L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap contributors'}).addTo(fullMap);Object.entries(resources).forEach(([k,r])=>{fullMarkers[k]=L.marker(r.latlng,{icon:makeIcon(r.color)}).addTo(fullMap).bindPopup(makePopup(r),{className:'roots-popup',maxWidth:240});});}
function openFullMap(){document.getElementById('mapOverlay').classList.add('open');document.body.style.overflow='hidden';setTimeout(()=>{initFullMap();fullMap.invalidateSize();},100);}
function closeFullMap(){document.getElementById('mapOverlay').classList.remove('open');document.body.style.overflow='';}
function handleOverlayClick(e){if(e.target===document.getElementById('mapOverlay'))closeFullMap();}
function flyToPin(k,op){if(!fullMap)return;fullMap.flyTo(resources[k].latlng,17,{duration:0.8});if(op)setTimeout(()=>fullMarkers[k].openPopup(),900);}
applyLang();
</script>
</body>
</html>
