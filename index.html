<!DOCTYPE html>

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #f7f4ee; color: #1a1a1a; min-height: 100vh; }
    .app { max-width: 420px; margin: 0 auto; background: #f7f4ee; min-height: 100vh; padding-bottom: 80px; }
    .header { padding: 3rem 1.5rem 1.5rem; display: flex; justify-content: space-between; align-items: flex-start; }
    .logo { font-family: 'DM Serif Display', serif; font-size: 28px; color: #2d5a3d; }
    .logo span { font-style: italic; color: #7fb069; }
    .avatar { width: 40px; height: 40px; border-radius: 50%; background: #2d5a3d; display: flex; align-items: center; justify-content: center; color: #f7f4ee; font-size: 14px; font-weight: 500; }
    .greeting { padding: 0 1.5rem 1.5rem; }
    .greeting p { font-size: 13px; color: #7a7060; margin-bottom: 4px; }
    .greeting h1 { font-family: 'DM Serif Display', serif; font-size: 24px; font-weight: 400; }
    .wellness-card { margin: 0 1.5rem 1.5rem; background: #2d5a3d; border-radius: 20px; padding: 1.5rem; color: #f7f4ee; position: relative; overflow: hidden; }
    .wellness-card::before { content: ''; position: absolute; top: -40px; right: -40px; width: 160px; height: 160px; background: rgba(127,176,105,0.2); border-radius: 50%; }
    .wellness-label { font-size: 12px; color: #9fcf8a; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .wellness-title { font-family: 'DM Serif Display', serif; font-size: 20px; margin-bottom: 16px; line-height: 1.3; }
    .progress-bar-bg { background: rgba(255,255,255,0.2); border-radius: 100px; height: 6px; margin-bottom: 8px; }
    .progress-bar-fill { background: #9fcf8a; height: 6px; border-radius: 100px; width: 40%; }
    .progress-label { font-size: 12px; color: #c8e8b8; display: flex; justify-content: space-between; }
    .section-label { padding: 0 1.5rem; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: #7a7060; margin-bottom: 12px; }
    .modules { padding: 0 1.5rem; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
    .module-card { background: white; border-radius: 16px; padding: 1rem; border: 1px solid rgba(0,0,0,0.04); cursor: pointer; }
    .module-card.featured { grid-column: span 2; background: #eef5eb; display: flex; align-items: center; gap: 1rem; }
    .module-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 8px; flex-shrink: 0; }
    .module-card.featured .module-icon { margin-bottom: 0; }
    .module-tag { font-size: 10px; padding: 2px 8px; border-radius: 100px; font-weight: 500; display: inline-block; margin-bottom: 6px; }
    .tag-start { background: #eef5eb; color: #3b6d11; }
    .tag-next { background: #e6f1fb; color: #185fa5; }
    .tag-new { background: #faeeda; color: #854f0b; }
    .module-title { font-size: 13px; font-weight: 500; color: #1a1a1a; line-height: 1.3; }
    .module-sub { font-size: 11px; color: #7a7060; margin-top: 2px; }
    .map-wrap { margin: 0 1.5rem 1.5rem; border-radius: 16px; overflow: hidden; border: 1px solid rgba(0,0,0,0.06); background: white; }
    .map-info { padding: 12px 16px; display: none; border-top: 1px solid rgba(0,0,0,0.06); }
    .map-info-row { display: flex; align-items: center; gap: 10px; }
    .map-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .map-tag { font-size: 10px; padding: 2px 8px; border-radius: 100px; font-weight: 500; display: inline-block; margin-bottom: 3px; }
    .map-name { font-size: 13px; font-weight: 500; color: #1a1a1a; }
    .map-hours { font-size: 11px; color: #7a7060; margin-top: 1px; }
    .nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 420px; background: white; border-top: 1px solid rgba(0,0,0,0.06); display: flex; justify-content: space-around; padding: 12px 0 20px; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; opacity: 0.4; }
    .nav-item.active { opacity: 1; }
    .nav-label { font-size: 10px; color: #1a1a1a; }
    .nav-item.active .nav-label { color: #2d5a3d; font-weight: 500; }

function showInfo(key) {
  const d = mapData[key];

  document.getElementById('map-tag').textContent = d.tag;
