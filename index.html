<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rice Bowl</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body.theme-morning {
      --bg: #f5efe3; --bg-card: #fffdf7; --bg-featured: #ede4d0;
      --text-primary: #1e1a14; --text-muted: #7a6a50; --text-faint: #b09a78;
      --wellness-bg: #ce9042; --wellness-orb: rgba(206,144,66,0.22); --wellness-label: #f5efe3;
      --nav-bg: #fffdf7; --nav-border: rgba(0,0,0,0.07);
      --section-label: #8a7a5a; --footer: #b09a78; --card-border: rgba(154,176,141,0.3);
      --accent: #274133; --logo-primary: #274133; --logo-accent: #9ab08d;
      --transition: background 0.6s ease, color 0.4s ease;
    }
    body.theme-afternoon {
      --bg: #edddc5; --bg-card: #f7f0e2; --bg-featured: #e4d5b5;
      --text-primary: #1e1a14; --text-muted: #6a5840; --text-faint: #9a8060;
      --wellness-bg: #7d2027; --wellness-orb: rgba(125,32,39,0.22); --wellness-label: #f5d0b0;
      --nav-bg: #f7f0e2; --nav-border: rgba(0,0,0,0.07);
      --section-label: #7a6040; --footer: #9a8060; --card-border: rgba(200,176,103,0.4);
      --accent: #274133; --logo-primary: #274133; --logo-accent: #9ab08d;
      --transition: background 0.6s ease, color 0.4s ease;
    }
    body.theme-evening {
      --bg: #1a2920; --bg-card: #274133; --bg-featured: #1f3328;
      --text-primary: #edddc5; --text-muted: #9ab08d; --text-faint: #6a8870;
      --wellness-bg: #7d2027; --wellness-orb: rgba(125,32,39,0.28); --wellness-label: #f5d0b0;
      --nav-bg: #274133; --nav-border: rgba(237,221,197,0.08);
      --section-label: #7a9a80; --footer: #5a7860; --card-border: rgba(154,176,141,0.18);
      --accent: #9ab08d; --logo-primary: #9ab08d; --logo-accent: #c8b067;
      --transition: background 0.6s ease, color 0.4s ease;
    }

    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; transition: var(--transition); }
    .app { max-width: 420px; margin: 0 auto; background: var(--bg); min-height: 100vh; padding-bottom: 80px; transition: var(--transition); }

    .header { padding: 1.5rem 1.5rem 0.5rem; display: flex; justify-content: space-between; align-items: flex-start; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .logo { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--logo-primary); }
    .logo span { font-style: italic; color: var(--logo-accent); }
    .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; color: #edddc5; font-size: 14px; font-weight: 500; flex-shrink: 0; }

    .lang-btn { background: var(--bg-card); border: 1px solid var(--card-border); border-radius: 20px; padding: 5px 10px; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; gap: 4px; white-space: nowrap; }
    .lang-btn:hover { border-color: var(--accent); color: var(--accent); }
    .lang-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 999; align-items: flex-end; justify-content: center; }
    .lang-overlay.open { display: flex; }
    .lang-modal { background: var(--bg); border-radius: 24px 24px 0 0; width: 100%; max-width: 420px; padding: 1.5rem; padding-bottom: 2.5rem; transition: background 0.6s ease; }
    .lang-handle { width: 36px; height: 4px; background: var(--card-border); border-radius: 2px; margin: 0 auto 1.25rem; }
    .lang-title { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--text-primary); margin-bottom: 1rem; }
    .lang-list { display: flex; flex-direction: column; gap: 8px; }
    .lang-option { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: var(--bg-card); border: 1px solid var(--card-border); border-radius: 14px; cursor: pointer; transition: all 0.2s; }
    .lang-option:hover { border-color: var(--accent); }
    .lang-option.active { border-color: var(--accent); background: var(--bg-featured); }
    .lang-option-left { display: flex; flex-direction: column; gap: 2px; }
    .lang-native { font-size: 15px; font-weight: 500; color: var(--text-primary); }
    .lang-english { font-size: 11px; color: var(--text-muted); }
    .lang-check { font-size: 16px; color: var(--accent); opacity: 0; }
    .lang-option.active .lang-check { opacity: 1; }

    .sky-arc-wrap { padding: 0 1.5rem; }
    .sky-arc-svg { width: 100%; display: block; overflow: visible; opacity: 0.85; }

    .greeting { padding: 0 1.5rem 1.5rem; }
    .greeting p { font-size: 13px; color: var(--text-muted); margin-bottom: 4px; }
    .greeting h1 { font-family: 'DM Serif Display', serif; font-size: 24px; font-weight: 400; color: var(--text-primary); }

    .budget-card { margin: 0 1.5rem 1.5rem; background: var(--wellness-bg); border-radius: 20px; padding: 1.5rem; position: relative; overflow: hidden; text-decoration: none; display: block; transition: background 0.6s ease, transform 0.15s ease; }
    .budget-card:active { transform: scale(0.98); }
    .budget-card::before { content: ''; position: absolute; top: -40px; right: -40px; width: 160px; height: 160px; background: var(--wellness-orb); border-radius: 50%; }
    .budget-card-label { font-size: 12px; color: var(--wellness-label); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; opacity: 0.85; }
    .budget-card-title { font-family: 'DM Serif Display', serif; font-size: 20px; margin-bottom: 14px; line-height: 1.3; color: #edddc5; }
    .budget-card-row { display: flex; gap: 10px; margin-bottom: 14px; }
    .budget-pill { flex: 1; background: rgba(237,221,197,0.15); border-radius: 12px; padding: 10px 12px; }
    .budget-pill-label { font-size: 10px; color: rgba(237,221,197,0.65); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
    .budget-pill-value { font-size: 15px; font-weight: 500; color: #edddc5; }
    .budget-pill-value.pos { color: #b8d4a8; }
    .budget-pill-value.neg { color: #f5a898; }
    .budget-card-cta { font-size: 12px; color: var(--wellness-label); opacity: 0.85; }

    .section-label { padding: 0 1.5rem; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--section-label); margin-bottom: 12px; }

    .modules { padding: 0 1.5rem; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
    .module-card { background: var(--bg-card); border-radius: 16px; padding: 1rem; border: 1px solid var(--card-border); cursor: pointer; transition: background 0.6s ease; }
    .module-card.featured { grid-column: span 2; background: var(--bg-featured); display: flex; align-items: center; gap: 1rem; }
    .module-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 8px; flex-shrink: 0; }
    .module-card.featured .module-icon { margin-bottom: 0; }
    .module-tag { font-size: 10px; padding: 2px 8px; border-radius: 100px; font-weight: 500; display: inline-block; margin-bottom: 6px; }
    .tag-start { background: rgba(154,176,141,0.3); color: #274133; }
    .tag-next  { background: rgba(200,176,103,0.3); color: #5a4010; }
    .tag-new   { background: rgba(125,32,39,0.12); color: #7d2027; }
    .module-title { font-size: 13px; font-weight: 500; color: var(--text-primary); line-height: 1.3; }
    .module-sub   { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .map-wrap { margin: 0 1.5rem 1.5rem; border-radius: 16px; overflow: hidden; border: 1px solid var(--card-border); background: var(--bg-card); transition: background 0.6s ease; }
    .map-header { padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--card-border); }
    .map-header-title { font-size: 13px; font-weight: 500; color: var(--text-primary); }
    .map-header-sub   { font-size: 11px; color: var(--text-muted); }
    .expand-btn { font-size: 11px; background: var(--accent); color: #edddc5; border: none; border-radius: 20px; padding: 5px 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; }
    #map { height: 220px; width: 100%; z-index: 1; }

    .map-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 9999; align-items: flex-end; justify-content: center; }
    .map-overlay.open { display: flex; }
    .map-modal { background: white; border-radius: 24px 24px 0 0; width: 100%; max-width: 420px; height: 88vh; display: flex; flex-direction: column; overflow: hidden; }
    .modal-handle { width: 36px; height: 4px; background: #e0dbd2; border-radius: 2px; margin: 0 auto 12px; }
    .modal-header { padding: 0 0 10px; display: flex; align-items: center; justify-content: space-between; }
    .modal-title  { font-size: 15px; font-weight: 500; color: #1a1a1a; font-family: 'DM Sans', sans-serif; }
    .close-btn { background: #f0ede8; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
    #map-full { flex: 1; min-height: 0; }
    .pin-bar { padding: 10px 14px; border-top: 1px solid rgba(0,0,0,0.06); display: flex; gap: 8px; overflow-x: auto; flex-shrink: 0; }
    .pin-chip { display: flex; align-items: center; gap: 7px; background: #f5efe3; border: 1px solid rgba(0,0,0,0.07); border-radius: 100px; padding: 6px 12px 6px 8px; white-space: nowrap; cursor: pointer; }
    .pin-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .pin-chip-label { font-size: 12px; font-weight: 500; color: #1a1a1a; font-family: 'DM Sans', sans-serif; }
    .roots-popup .leaflet-popup-content-wrapper { border-radius: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); padding: 0; overflow: hidden; font-family: 'DM Sans', sans-serif; }
    .roots-popup .leaflet-popup-content { margin: 0; width: 220px !important; }
    .roots-popup .leaflet-popup-tip { background: white; }
    .popup-inner { padding: 14px; }
    .popup-tag   { font-size: 10px; padding: 2px 8px; border-radius: 100px; font-weight: 500; display: inline-block; margin-bottom: 8px; }
    .popup-name  { font-size: 13px; font-weight: 500; color: #1a1a1a; margin-bottom: 4px; line-height: 1.3; }
    .popup-desc  { font-size: 11px; color: #7a6a50; margin-bottom: 8px; line-height: 1.5; }
    .popup-hours { font-size: 11px; color: #274133; font-weight: 500; margin-bottom: 8px; }
    .popup-link  { display: block; text-align: center; background: #274133; color: #edddc5; font-size: 11px; font-weight: 500; padding: 7px; border-radius: 8px; text-decoration: none; font-family: 'DM Sans', sans-serif; }
    .popup-link:hover { background: #3a5a45; }

    .page-footer { text-align: center; padding: 0 0 1.5rem; font-size: 11px; color: var(--footer); }

    .nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 420px; background: var(--nav-bg); border-top: 1px solid var(--nav-border); display: flex; justify-content: space-around; padding: 12px 0 20px; z-index: 100; transition: background 0.6s ease; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; opacity: 0.4; text-decoration: none; }
    .nav-item.active { opacity: 1; }
    .nav-label { font-size: 10px; color: var(--text-primary); }
    .nav-item.active .nav-label { color: var(--accent); font-weight: 500; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">Rice <span>Bowl</span></div>

const LANG_ORDER=['en','zh','ja','vi','ko'];
let currentLang=localStorage.getItem('bloom_lang')||'en';
function t(k){return LANGS[currentLang][k]||LANGS.en[k]||'';}

function applyLang(){
  const h=new Date().getHours();
  document.getElementById('greeting-time').textContent=h<12?t('gm'):h<17?t('ga'):t('ge');
  document.getElementById('greeting-name').textContent=t('welcome');

  document.getElementById('pill-label-month').textContent=t('pill_month');
  document.getElementById('pill-label-expenses').textContent=t('pill_expenses');
  document.getElementById('card-cta').textContent=t('budget_cta');
  document.getElementById('section-learn').textContent=t('learn');
  document.getElementById('section-resources').textContent=t('resources_section');
  document.getElementById('tag-next').textContent=t('tag_next');
  document.getElementById('tag-start').textContent=t('tag_start');
  document.getElementById('tag-new').textContent=t('tag_new');
  document.getElementById('mod1-title').textContent=t('mod1_title');
  document.getElementById('mod1-sub').textContent=t('mod1_sub');
  document.getElementById('mod2-title').textContent=t('mod2_title');
  document.getElementById('mod2-sub').textContent=t('mod2_sub');
  document.getElementById('mod3-title').textContent=t('mod3_title');
  document.getElementById('mod3-sub').textContent=t('mod3_sub');
  document.getElementById('map-title').textContent=t('map_title');
  document.getElementById('map-sub').textContent=t('map_sub');
  document.getElementById('map-expand-btn').textContent=t('map_expand');
  document.getElementById('map-modal-title').textContent=t('map_title');
  document.getElementById('pin-food').textContent=t('pin_food');
  document.getElementById('pin-advising').textContent=t('pin_advising');
  document.getElementById('pin-aid').textContent=t('pin_aid');
  document.getElementById('nav-home').textContent=t('nav_home');
  document.getElementById('nav-learn').textContent=t('nav_learn');
  document.getElementById('nav-resources').textContent=t('nav_resources');
  document.getElementById('nav-budget').textContent=t('nav_budget');
  document.getElementById('lang-current').textContent=LANGS[currentLang].code;
  document.getElementById('lang-modal-title').textContent=t('lang_title');
  const now=new Date();
  document.getElementById('budget-card-title').textContent=LANGS[currentLang].months[now.getMonth()];
  document.getElementById('lang-list').innerHTML=LANG_ORDER.map(lk=>{const l=LANGS[lk];return `<div class="lang-option ${lk===currentLang?'active':''}" onclick="selectLang('${lk}')"><div class="lang-option-left"><div class="lang-native">${l.native}</div><div class="lang-english">${l.english}</div></div><div class="lang-check">✓</div></div>`;}).join('');
}
function openLang(){document.getElementById('lang-overlay').classList.add('open');}
function closeLang(){document.getElementById('lang-overlay').classList.remove('open');}
function handleLangOverlay(e){if(e.target===document.getElementById('lang-overlay'))closeLang();}
function selectLang(lk){currentLang=lk;localStorage.setItem('bloom_lang',lk);applyLang();closeLang();}

// Theme & sky
const hour=new Date().getHours(),mins=new Date().getMinutes(),timeDecimal=hour+mins/60;
document.body.classList.add(hour<12?'theme-morning':hour<17?'theme-afternoon':'theme-evening');
const RISE=6,SET=20,isDay=timeDecimal>=RISE&&timeDecimal<SET;
let progress=isDay?(timeDecimal-RISE)/(SET-RISE):(()=>{const nd=24-(SET-RISE),nt=timeDecimal>=SET?timeDecimal-SET:timeDecimal+(24-SET);return nt/nd;})();
const ang=Math.PI-progress*Math.PI;
document.getElementById('sky-body').setAttribute('transform',`translate(${170+150*Math.cos(ang)},${48-42*Math.sin(ang)})`);
const circle=document.getElementById('sky-circle'),glow=document.getElementById('sky-glow'),rays=document.getElementById('sun-rays'),moonDetail=document.getElementById('moon-detail'),stars=document.getElementById('stars'),arcPath=document.getElementById('arc-path'),horizonLine=document.getElementById('horizon-line');
if(isDay){const edge=progress<0.15||progress>0.85;circle.setAttribute('fill',edge?'#ce9042':'#c8b067');glow.setAttribute('fill',edge?'#f5d4a0':'#e8d898');rays.setAttribute('stroke',edge?'#ce9042':'#c8b067');rays.style.opacity='1';moonDetail.style.opacity='0';stars.style.opacity='0';arcPath.setAttribute('stroke','#c8b067');horizonLine.setAttribute('stroke','#c8b067');}
else{circle.setAttribute('fill','#edddc5');glow.setAttribute('fill','#c8b067');rays.style.opacity='0';moonDetail.style.opacity='1';stars.style.opacity='1';arcPath.setAttribute('stroke','#9ab08d');horizonLine.setAttribute('stroke','#9ab08d');}

// Budget preview
(function(){
  const entries=JSON.parse(localStorage.getItem('bloom_budget')||'[]');
  const now=new Date(),key=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const me=entries.filter(e=>e.month===key);
  const inc=me.filter(e=>e.type==='income').reduce((a,e)=>a+e.amount,0);
  const exp=me.filter(e=>e.type==='expense').reduce((a,e)=>a+e.amount,0);
  const fmt=n=>'$'+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  const balEl=document.getElementById('home-balance');
  balEl.textContent=fmt(inc-exp);balEl.className='budget-pill-value '+(inc-exp<0?'neg':'pos');
  document.getElementById('home-expenses').textContent=fmt(exp);
})();

// Map
const UW_CENTER=[47.6553,-122.3035];
const resources={food:{latlng:[47.6599,-122.3152],color:'#274133',tag:'Food support',tagBg:'rgba(154,176,141,0.2)',tagColor:'#274133',name:'UW Food Pantry',desc:'Free groceries, fresh produce, and pantry staples for UW students in need. No eligibility requirements.',hours:'Mon–Fri · Hours vary by quarter',link:'https://www.washington.edu/anyhungryhusky/',linkLabel:'Visit website →'},advising:{latlng:[47.6561,-122.3082],color:'#9ab08d',tag:'Academic advising',tagBg:'rgba(154,176,141,0.2)',tagColor:'#274133',name:'UAA Undergraduate Advising',desc:'Academic planning, degree requirements, major exploration, and support for all UW undergrads.',hours:'Mon–Fri 8am–5pm',link:'https://www.washington.edu/uaa/',linkLabel:'Visit website →'},financialaid:{latlng:[47.6532,-122.3082],color:'#ce9042',tag:'Financial aid',tagBg:'rgba(206,144,66,0.18)',tagColor:'#7a4010',name:'Office of Student Financial Aid',desc:'Help with FAFSA, scholarships, grants, loans, and work-study. Located in Schmitz Hall.',hours:'Mon–Fri 11am–3pm (in-person)',link:'https://www.washington.edu/financialaid/',linkLabel:'Visit website →'}};
const makeIcon=c=>L.divIcon({className:'',html:`<svg width="28" height="38" viewBox="0 0 28 38" xmlns="http://www.w3.org/2000/svg"><circle cx="14" cy="14" r="13" fill="${c}" stroke="white" stroke-width="2.5"/><circle cx="14" cy="14" r="5" fill="white"/><polygon points="14,38 6,24 22,24" fill="${c}"/></svg>`,iconSize:[28,38],iconAnchor:[14,38],popupAnchor:[0,-40]});
const makePopup=r=>`<div class="popup-inner"><div class="popup-tag" style="background:${r.tagBg};color:${r.tagColor};">${r.tag}</div><div class="popup-name">${r.name}</div><div class="popup-desc">${r.desc}</div><div class="popup-hours">🕐 ${r.hours}</div><a class="popup-link" href="${r.link}" target="_blank">${r.linkLabel}</a></div>`;
const miniMap=L.map('map',{center:UW_CENTER,zoom:15,zoomControl:false,scrollWheelZoom:false,dragging:false,doubleClickZoom:false,touchZoom:false});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap contributors'}).addTo(miniMap);
Object.entries(resources).forEach(([k,r])=>L.marker(r.latlng,{icon:makeIcon(r.color)}).addTo(miniMap).bindPopup(makePopup(r),{className:'roots-popup',maxWidth:240}));
let fullMap=null,fullMarkers={};
function initFullMap(){if(fullMap)return;fullMap=L.map('map-full',{center:UW_CENTER,zoom:16,zoomControl:true});L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap contributors'}).addTo(fullMap);Object.entries(resources).forEach(([k,r])=>{fullMarkers[k]=L.marker(r.latlng,{icon:makeIcon(r.color)}).addTo(fullMap).bindPopup(makePopup(r),{className:'roots-popup',maxWidth:240});});}
function openFullMap(){document.getElementById('mapOverlay').classList.add('open');document.body.style.overflow='hidden';setTimeout(()=>{initFullMap();fullMap.invalidateSize();},100);}
function closeFullMap(){document.getElementById('mapOverlay').classList.remove('open');document.body.style.overflow='';}
function handleOverlayClick(e){if(e.target===document.getElementById('mapOverlay'))closeFullMap();}
function flyToPin(k,op){if(!fullMap)return;fullMap.flyTo(resources[k].latlng,17,{duration:0.8});if(op)setTimeout(()=>fullMarkers[k].openPopup(),900);}

applyLang();
</script>
