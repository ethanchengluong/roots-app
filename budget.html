<!DOCTYPE html>
<html lang="en">
<head>

  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>

    body.theme-evening { --bg:#1a2920;--bg-card:#274133;--bg-featured:#1f3328;--text-primary:#edddc5;--text-muted:#9ab08d;--text-faint:#6a8870;--wellness-bg:#7d2027;--wellness-orb:rgba(125,32,39,0.28);--wellness-label:#f5d0b0;--nav-bg:#274133;--nav-border:rgba(237,221,197,0.08);--section-label:#7a9a80;--footer:#5a7860;--card-border:rgba(154,176,141,0.18);--accent:#9ab08d;--logo-primary:#9ab08d;--logo-accent:#c8b067;--input-bg:#1f3328;--modal-bg:#274133;--transition:background 0.6s ease,color 0.4s ease; }

    .lang-btn { background:var(--bg-card);border:1px solid var(--card-border);border-radius:20px;padding:5px 10px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;gap:4px; }
    .lang-btn:hover { border-color:var(--accent);color:var(--accent); }

    .lang-handle { width:36px;height:4px;background:var(--card-border);border-radius:2px;margin:0 auto 1.25rem; }

    .page-title { padding:0.75rem 1.5rem 1rem; }

    .page-title h1 { font-family:'DM Serif Display',serif;font-size:24px;font-weight:400;color:var(--text-primary); }
    .month-bar { display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;margin-bottom:1.25rem; }
    .month-label { font-family:'DM Serif Display',serif;font-size:18px;color:var(--accent); }
    .month-btn { background:none;border:1px solid var(--card-border);border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:14px;color:var(--text-muted);display:flex;align-items:center;justify-content:center; }

    .summary-pill-value { font-size:16px;font-weight:500;color:#edddc5; }

    .goal-title { font-size:13px;font-weight:500;color:var(--text-primary); }

    .goal-amount { font-family:'DM Serif Display',serif;font-size:22px;color:var(--accent);margin-bottom:4px; }
    .goal-sub { font-size:11px;color:var(--text-muted);margin-bottom:12px; }
    .goal-bar-bg { background:rgba(0,0,0,0.07);border-radius:100px;height:8px;margin-bottom:6px; }

    .goal-bar-labels { display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted); }
    .goal-empty { font-size:12px;color:var(--text-muted);text-align:center;padding:0.5rem 0; }
    .donut-wrap { margin:0 1.5rem 1.25rem;background:var(--bg-card);border-radius:20px;padding:1.25rem;border:1px solid var(--card-border);transition:background 0.6s ease; }
    .donut-title { font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--section-label);margin-bottom:1rem; }
    .donut-inner { display:flex;align-items:center;gap:1.25rem; }
    .donut-svg { flex-shrink:0; }
    .donut-legend { flex:1;display:flex;flex-direction:column;gap:8px; }
    .legend-item { display:flex;align-items:center;gap:8px; }
    .legend-dot { width:8px;height:8px;border-radius:50%;flex-shrink:0; }
    .legend-label { font-size:11px;color:var(--text-primary);flex:1; }
    .legend-pct { font-size:11px;color:var(--text-muted);font-weight:500; }
    .section-label { padding:0 1.5rem;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--section-label);margin-bottom:10px; }
    .entry-list { padding:0 1.5rem;display:flex;flex-direction:column;gap:8px;margin-bottom:1.25rem; }
    .entry-card { background:var(--bg-card);border-radius:14px;padding:12px 14px;border:1px solid var(--card-border);display:flex;align-items:flex-start;gap:10px;transition:background 0.6s ease; }
    .entry-icon { width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0; }
    .entry-body { flex:1;min-width:0; }
    .entry-name { font-size:13px;font-weight:500;color:var(--text-primary); }
    .entry-cat { font-size:11px;color:var(--text-muted);margin-top:1px; }
    .entry-note { font-size:11px;color:var(--text-muted);margin-top:4px;font-style:italic;line-height:1.4; }
    .entry-right { display:flex;flex-direction:column;align-items:flex-end;gap:4px; }
    .entry-amount { font-size:14px;font-weight:500; }
    .entry-amount.income { color:#274133; }
    .entry-amount.expense { color:#7d2027; }
    .entry-delete { background:none;border:none;cursor:pointer;font-size:12px;color:var(--text-faint);padding:2px 4px;border-radius:6px; }
    .entry-delete:hover { background:rgba(125,32,39,0.1);color:#7d2027; }
    .action-row { padding:0 1.5rem;margin-bottom:1.25rem;display:flex;gap:8px; }
    .add-btn { flex:1;background:var(--accent);color:#edddc5;border:none;border-radius:14px;padding:14px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer; }
    .export-btn { background:var(--bg-card);color:var(--text-primary);border:1px solid var(--card-border);border-radius:14px;padding:14px 16px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;white-space:nowrap; }
    .modal-overlay { display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:998;align-items:flex-end;justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal { background:var(--modal-bg);border-radius:24px 24px 0 0;width:100%;max-width:420px;padding:1.5rem;padding-bottom:2rem;max-height:90vh;overflow-y:auto;transition:background 0.6s ease; }
    .goal-modal-el { background:var(--modal-bg);border-radius:24px 24px 0 0;width:100%;max-width:420px;padding:1.5rem;padding-bottom:2rem;transition:background 0.6s ease; }
    .modal-handle { width:36px;height:4px;background:rgba(0,0,0,0.12);border-radius:2px;margin:0 auto 1.25rem; }
    .modal-title { font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:1.25rem;color:var(--text-primary); }
    .form-group { margin-bottom:1rem; }
    .form-label { font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:block; }
    .form-input,.form-select,.form-textarea { width:100%;background:var(--input-bg);border:1px solid var(--card-border);border-radius:12px;padding:12px 14px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text-primary);outline:none;transition:border-color 0.2s; }
    .form-input:focus,.form-select:focus,.form-textarea:focus { border-color:#9ab08d; }
    .form-textarea { resize:none;height:72px;line-height:1.5; }
    .form-select { appearance:none; }
    .type-toggle { display:flex;gap:8px;margin-bottom:1rem; }
    .type-btn { flex:1;padding:10px;border-radius:12px;border:1px solid var(--card-border);background:var(--bg-card);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;color:var(--text-muted);transition:all 0.2s; }
    .type-btn.active.income { background:rgba(154,176,141,0.25);color:#274133;border-color:#9ab08d;font-weight:500; }
    .type-btn.active.expense { background:rgba(125,32,39,0.1);color:#7d2027;border-color:#7d2027;font-weight:500; }
    .form-submit { width:100%;background:var(--accent);color:#edddc5;border:none;border-radius:14px;padding:14px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;margin-top:0.5rem; }
    .form-cancel { width:100%;background:none;border:none;color:var(--text-muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;margin-top:10px;padding:8px; }
    .empty { text-align:center;padding:1.5rem;color:var(--text-muted); }
    .empty-icon { font-size:32px;margin-bottom:8px; }
    .empty-text { font-size:12px; }
    .page-footer { text-align:center;padding:0 0 1.5rem;font-size:11px;color:var(--footer); }
    .nav { position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:var(--nav-bg);border-top:1px solid var(--nav-border);display:flex;justify-content:space-around;padding:12px 0 20px;z-index:100;transition:background 0.6s ease; }
    .nav-item { display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;opacity:0.4;text-decoration:none; }
    .nav-item.active { opacity:1; }
    .nav-label { font-size:10px;color:var(--text-primary); }
    .nav-item.active .nav-label { color:var(--accent);font-weight:500; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">BL<span>OOM</span></div>
    <div class="header-right">
      <button class="lang-btn" onclick="openLang()">🌐 <span id="lang-current">EN</span></button>
      <div class="avatar">EC</div>
    </div>
  </div>
  <div class="sky-arc-wrap">
    <svg class="sky-arc-svg" viewBox="0 0 340 52" xmlns="http://www.w3.org/2000/svg">
      <line x1="0" y1="48" x2="340" y2="48" stroke-width="1" stroke-linecap="round" id="horizon-line"/>
      <path id="arc-path" d="M 20 48 A 150 42 0 0 1 320 48" fill="none" stroke-width="1" stroke-dasharray="3 5" stroke-linecap="round"/>
      <g id="stars" opacity="0"><circle cx="60" cy="12" r="1" fill="#edddc5" opacity="0.7"/><circle cx="110" cy="5" r="0.8" fill="#edddc5" opacity="0.5"/><circle cx="170" cy="9" r="1.1" fill="#edddc5" opacity="0.8"/><circle cx="230" cy="4" r="0.8" fill="#edddc5" opacity="0.6"/><circle cx="280" cy="13" r="1" fill="#edddc5" opacity="0.7"/></g>
      <g id="sky-body"><circle id="sky-glow" cx="0" cy="0" r="10" opacity="0.25"/><circle id="sky-circle" cx="0" cy="0" r="7"/><g id="moon-detail" opacity="0"><circle cx="2.5" cy="-2" r="1.6" fill="rgba(0,0,0,0.1)"/><circle cx="-2" cy="2" r="1.2" fill="rgba(0,0,0,0.08)"/></g><g id="sun-rays" stroke-width="1.2" stroke-linecap="round"><line x1="0" y1="-11" x2="0" y2="-14"/><line x1="8" y1="-8" x2="10" y2="-10"/><line x1="11" y1="0" x2="14" y2="0"/><line x1="8" y1="8" x2="10" y2="10"/><line x1="0" y1="11" x2="0" y2="14"/><line x1="-8" y1="8" x2="-10" y2="10"/><line x1="-11" y1="0" x2="-14" y2="0"/><line x1="-8" y1="-8" x2="-10" y2="-10"/></g></g>
    </svg>
  </div>
  <div class="page-title">
    <p id="greeting-time"></p>
    <h1 id="page-heading"></h1>
  </div>
  <div class="month-bar">
    <button class="month-btn" onclick="changeMonth(-1)">‹</button>
    <div class="month-label" id="month-label"></div>
    <button class="month-btn" onclick="changeMonth(1)">›</button>
  </div>
  <div class="summary-card">
    <div class="summary-label" id="sum-label"></div>
    <div class="summary-amount" id="balance">$0.00</div>
    <div class="summary-sub" id="balance-sub"></div>
    <div class="summary-row">
      <div class="summary-pill"><div class="summary-pill-label" id="pill-income-label"></div><div class="summary-pill-value pos" id="total-income">$0.00</div></div>
      <div class="summary-pill"><div class="summary-pill-label" id="pill-expense-label"></div><div class="summary-pill-value neg" id="total-expenses">$0.00</div></div>
    </div>
  </div>
  <div class="section-label" id="section-goal"></div>
  <div class="goal-card">
    <div class="goal-header">
      <div class="goal-title" id="goal-title-el">🎯 Monthly Savings Goal</div>
      <button class="goal-edit-btn" onclick="openGoalModal()" id="goal-edit-btn">Edit</button>
    </div>
    <div id="goal-body"></div>
  </div>
  <div class="donut-wrap" id="donut-wrap" style="display:none;">
    <div class="donut-title" id="donut-title"></div>

      <svg class="donut-svg" width="100" height="100" viewBox="0 0 100 100" id="donut-svg"></svg>
      <div class="donut-legend" id="donut-legend"></div>
    </div>
  </div>
  <div class="section-label" id="section-income"></div>
  <div class="entry-list" id="income-list"></div>
  <div class="section-label" id="section-expenses"></div>
  <div class="entry-list" id="expense-list"></div>
  <div class="action-row">
    <button class="add-btn" onclick="openModal()" id="add-btn">＋ Add entry</button>

  <div class="page-footer">designed by @ethanchengluong</div>
  <nav class="nav">
    <a href="index.html" class="nav-item"><span>🏠</span><span class="nav-label" id="nav-home"></span></a>
    <a href="#" class="nav-item"><span>📚</span><span class="nav-label" id="nav-learn"></span></a>
    <a href="resources.html" class="nav-item"><span>🔖</span><span class="nav-label" id="nav-resources"></span></a>
    <a href="budget.html" class="nav-item active"><span>💸</span><span class="nav-label" id="nav-budget"></span></a>
  </nav>
</div>

<div class="lang-overlay" id="lang-overlay" onclick="handleLangOverlay(event)">
  <div class="lang-modal-el">
    <div class="lang-handle"></div>
    <div class="lang-title-el" id="lang-modal-title">Language</div>
    <div class="lang-list" id="lang-list"></div>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="handleOverlay(event,'modal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="type-toggle">
      <button class="type-btn active income" id="btn-income" onclick="setType('income')"></button>
      <button class="type-btn expense" id="btn-expense" onclick="setType('expense')"></button>
    </div>
    <div class="form-group"><label class="form-label" id="label-desc"></label><input class="form-input" id="f-desc" placeholder=""/></div>
    <div class="form-group"><label class="form-label" id="label-amount"></label><input class="form-input" id="f-amount" type="number" min="0" step="0.01" placeholder="0.00"/></div>
    <div class="form-group"><label class="form-label" id="label-cat"></label><select class="form-select" id="f-cat"></select></div>
    <div class="form-group"><label class="form-label" id="label-notes"></label><textarea class="form-textarea" id="f-note" placeholder=""></textarea></div>
    <button class="form-submit" onclick="submitEntry()" id="submit-btn"></button>
    <button class="form-cancel" onclick="closeModal('modal')" id="cancel-btn"></button>
  </div>
</div>

<div class="modal-overlay" id="goal-modal" onclick="handleOverlay(event,'goal-modal')">

    <div class="modal-handle"></div>
    <div class="modal-title" id="goal-modal-title"></div>
    <div class="form-group"><label class="form-label" id="label-goal-name"></label><input class="form-input" id="g-name" placeholder=""/></div>
    <div class="form-group"><label class="form-label" id="label-goal-target"></label><input class="form-input" id="g-target" type="number" min="0" step="1" placeholder="500"/></div>
    <div class="form-group"><label class="form-label" id="label-goal-saved"></label><input class="form-input" id="g-saved" type="number" min="0" step="1" placeholder="0"/></div>
    <button class="form-submit" onclick="saveGoal()" id="goal-submit-btn"></button>
    <button class="form-cancel" onclick="closeModal('goal-modal')" id="goal-cancel-btn"></button>
  </div>
</div>

<script>

const hour=new Date().getHours(),mins=new Date().getMinutes(),timeDecimal=hour+mins/60;
document.body.classList.add(hour<12?'theme-morning':hour<17?'theme-afternoon':'theme-evening');
const RISE=6,SET=20,isDay=timeDecimal>=RISE&&timeDecimal<SET;
let progress=isDay?(timeDecimal-RISE)/(SET-RISE):(()=>{const nd=24-(SET-RISE),nt=timeDecimal>=SET?timeDecimal-SET:timeDecimal+(24-SET);return nt/nd;})();
const ang=Math.PI-progress*Math.PI;
document.getElementById('sky-body').setAttribute('transform',`translate(${170+150*Math.cos(ang)},${48-42*Math.sin(ang)})`);
const circle=document.getElementById('sky-circle'),glow=document.getElementById('sky-glow'),rays=document.getElementById('sun-rays'),moonDetail=document.getElementById('moon-detail'),stars=document.getElementById('stars'),arcPath=document.getElementById('arc-path'),horizonLine=document.getElementById('horizon-line');
if(isDay){const edge=progress<0.15||progress>0.85;circle.setAttribute('fill',edge?'#ce9042':'#c8b067');glow.setAttribute('fill',edge?'#f5d4a0':'#e8d898');rays.setAttribute('stroke',edge?'#ce9042':'#c8b067');rays.style.opacity='1';moonDetail.style.opacity='0';stars.style.opacity='0';arcPath.setAttribute('stroke','#c8b067');horizonLine.setAttribute('stroke','#c8b067');}
else{circle.setAttribute('fill','#edddc5');glow.setAttribute('fill','#c8b067');rays.style.opacity='0';moonDetail.style.opacity='1';stars.style.opacity='1';arcPath.setAttribute('stroke','#9ab08d');horizonLine.setAttribute('stroke','#9ab08d');}

// ── Budget logic ──────────────────────────────────────────────────────────────
const fmt=n=>'$'+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const monthKey=()=>`${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
const monthEntries=()=>entries.filter(e=>e.month===monthKey());

function changeMonth(d){currentMonth+=d;if(currentMonth>11){currentMonth=0;currentYear++;}if(currentMonth<0){currentMonth=11;currentYear--;}render();}

function setType(tp){
  currentType=tp;
  document.getElementById('btn-income').className='type-btn'+(tp==='income'?' active income':'');
  document.getElementById('btn-expense').className='type-btn'+(tp==='expense'?' active expense':'');
  populateCats();
}
function populateCats(){
  const cats=currentType==='income'?getLang().inc_cats:getLang().exp_cats;
  document.getElementById('f-cat').innerHTML=cats.map(c=>`<option value="${c}">${c}</option>`).join('');
}
function openModal(){setType('income');document.getElementById('f-desc').value='';document.getElementById('f-amount').value='';document.getElementById('f-note').value='';document.getElementById('modal').classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function handleOverlay(e,id){if(e.target===document.getElementById(id))closeModal(id);}
function submitEntry(){
  const desc=document.getElementById('f-desc').value.trim(),amount=parseFloat(document.getElementById('f-amount').value);
  const cat=document.getElementById('f-cat').value,note=document.getElementById('f-note').value.trim();
  if(!desc||!amount||amount<=0)return;
  entries.push({id:Date.now(),month:monthKey(),type:currentType,desc,amount,cat,note});
  localStorage.setItem('bloom_budget',JSON.stringify(entries));closeModal('modal');render();
}
function deleteEntry(id){entries=entries.filter(e=>e.id!==id);localStorage.setItem('bloom_budget',JSON.stringify(entries));render();}
function openGoalModal(){document.getElementById('g-name').value=goal?goal.name:'';document.getElementById('g-target').value=goal?goal.target:'';document.getElementById('g-saved').value=goal?goal.saved:'';document.getElementById('goal-modal').classList.add('open');}
function saveGoal(){const name=document.getElementById('g-name').value.trim(),target=parseFloat(document.getElementById('g-target').value),saved=parseFloat(document.getElementById('g-saved').value)||0;if(!name||!target||target<=0)return;goal={name,target,saved};localStorage.setItem('bloom_goal',JSON.stringify(goal));closeModal('goal-modal');render();}
function exportCSV(){
  const me=monthEntries();if(!me.length){alert(t('export_empty'));return;}
  const rows=[['Date','Type','Description','Category','Amount','Notes']];
  me.forEach(e=>rows.push([e.month,e.type,e.desc,e.cat.replace(/^[^ ]+ /,''),e.amount,e.note||'']));
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'}),url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download=`bloom-budget-${monthKey()}.csv`;a.click();URL.revokeObjectURL(url);
}
function getCatIcon(label){const m=label.match(/^(\S+)/);return m?m[1]:'📦';}
function renderGoal(){
  const el=document.getElementById('goal-body');
  if(!goal){el.innerHTML=`<div class="goal-empty">${t('goal_empty')}</div>`;return;}
  const pct=Math.min(100,Math.round(goal.saved/goal.target*100)),remaining=Math.max(0,goal.target-goal.saved);
  el.innerHTML=`<div class="goal-amount">${fmt(goal.saved)} <span style="font-size:14px;color:var(--text-muted)">of ${fmt(goal.target)}</span></div><div class="goal-sub">${goal.name} · ${remaining>0?fmt(remaining)+' '+t('goal_to_go'):t('goal_reached')}</div><div class="goal-bar-bg"><div class="goal-bar-fill" style="width:${pct}%;"></div></div><div class="goal-bar-labels"><span>${pct}%</span><span>${fmt(goal.target)}</span></div>`;
}
function renderDonut(exp){
  const wrap=document.getElementById('donut-wrap');if(!exp.length){wrap.style.display='none';return;}wrap.style.display='block';
  const groups={};exp.forEach(e=>{groups[e.cat]=(groups[e.cat]||0)+e.amount;});
  const total=Object.values(groups).reduce((a,b)=>a+b,0),items=Object.entries(groups).sort((a,b)=>b[1]-a[1]);
  const CX=50,CY=50,R=38,IN=24;let sa=-Math.PI/2,paths='';
  items.forEach(([cat,val],i)=>{const a2=(val/total)*Math.PI*2,ea=sa+a2,x1=CX+R*Math.cos(sa),y1=CY+R*Math.sin(sa),x2=CX+R*Math.cos(ea),y2=CY+R*Math.sin(ea),ix1=CX+IN*Math.cos(sa),iy1=CY+IN*Math.sin(sa),ix2=CX+IN*Math.cos(ea),iy2=CY+IN*Math.sin(ea),lg=a2>Math.PI?1:0,col=DONUT_COLORS[i%DONUT_COLORS.length];paths+=`<path d="M${ix1},${iy1} L${x1},${y1} A${R},${R} 0 ${lg},1 ${x2},${y2} L${ix2},${iy2} A${IN},${IN} 0 ${lg},0 ${ix1},${iy1}" fill="${col}" stroke="var(--bg)" stroke-width="1.5"/>`;sa=ea;});
  document.getElementById('donut-svg').innerHTML=paths;
  document.getElementById('donut-legend').innerHTML=items.map(([cat,val],i)=>{const icon=getCatIcon(cat),pct=Math.round(val/total*100);return `<div class="legend-item"><div class="legend-dot" style="background:${DONUT_COLORS[i%DONUT_COLORS.length]};"></div><div class="legend-label">${icon} ${cat.replace(/^\S+\s/,'')}</div><div class="legend-pct">${pct}%</div></div>`;}).join('');
}
function renderList(id,list,type){
  const el=document.getElementById(id);
  if(!list.length){el.innerHTML=`<div class="empty"><div class="empty-icon">${type==='income'?'💵':'🧾'}</div><div class="empty-text">${type==='income'?t('no_income'):t('no_expense')}</div></div>`;return;}
  el.innerHTML=list.map(e=>{const icon=getCatIcon(e.cat);return `<div class="entry-card"><div class="entry-icon" style="background:rgba(154,176,141,0.2);">${icon}</div><div class="entry-body"><div class="entry-name">${e.desc}</div><div class="entry-cat">${e.cat.replace(/^\S+\s/,'')}</div>${e.note?`<div class="entry-note">💬 ${e.note}</div>`:''}</div><div class="entry-right"><div class="entry-amount ${type}">${type==='income'?'+':'-'}${fmt(e.amount)}</div><button class="entry-delete" onclick="deleteEntry(${e.id})">✕</button></div></div>`;}).join('');
}
function render(){
  const months=getLang().months;
  document.getElementById('month-label').textContent=`${months[currentMonth]} ${currentYear}`;
  const me=monthEntries(),inc=me.filter(e=>e.type==='income'),exp=me.filter(e=>e.type==='expense');
  const totalInc=inc.reduce((a,e)=>a+e.amount,0),totalExp=exp.reduce((a,e)=>a+e.amount,0),bal=totalInc-totalExp;
  document.getElementById('total-income').textContent=fmt(totalInc);
  document.getElementById('total-expenses').textContent=fmt(totalExp);
  document.getElementById('balance').textContent=fmt(bal);
  document.getElementById('balance').style.color=bal<0?'#f5a898':'#edddc5';
  document.getElementById('balance-sub').textContent=bal<0?t('over'):t('remaining');
  renderGoal();renderDonut(exp);renderList('income-list',inc,'income');renderList('expense-list',exp,'expense');
}

populateCats();
applyLang();
</script>
</body>
</html>
