<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learn – BLOOM</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body.theme-morning {
      --bg: #fdf8e4; --bg-card: #ffffff; --bg-featured: #fef3c7;
      --text-primary: #1a1a1a; --text-muted: #7a7060; --text-faint: #b0a060;
      --wellness-bg: #c8960c; --wellness-orb: rgba(255,220,80,0.25);
      --wellness-label: #fde68a; --nav-bg: #ffffff; --nav-border: rgba(0,0,0,0.06);
      --section-label: #a09050; --footer: #c8b870; --card-border: rgba(200,150,12,0.12);
      --transition: background 0.6s ease, color 0.4s ease;
    }
    body.theme-afternoon {
      --bg: #fdf0e6; --bg-card: #ffffff; --bg-featured: #fde8d8;
      --text-primary: #1a1a1a; --text-muted: #7a6050; --text-faint: #b08060;
      --wellness-bg: #c45c2a; --wellness-orb: rgba(255,160,80,0.25);
      --wellness-label: #fcd0b0; --nav-bg: #ffffff; --nav-border: rgba(0,0,0,0.06);
      --section-label: #a07050; --footer: #c89070; --card-border: rgba(196,92,42,0.12);
      --transition: background 0.6s ease, color 0.4s ease;
    }
    body.theme-evening {
      --bg: #12122a; --bg-card: #1e1e3a; --bg-featured: #1a1a32;
      --text-primary: #e8e4f0; --text-muted: #8880a8; --text-faint: #6660a8;
      --wellness-bg: #3d2b6b; --wellness-orb: rgba(120,80,200,0.25);
      --wellness-label: #a890d8; --nav-bg: #1e1e3a; --nav-border: rgba(255,255,255,0.06);
      --section-label: #6860a0; --footer: #4a4480; --card-border: rgba(168,144,216,0.15);
      --transition: background 0.6s ease, color 0.4s ease;
    }

    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; transition: var(--transition); }
    .app { max-width: 420px; margin: 0 auto; background: var(--bg); min-height: 100vh; padding-bottom: 100px; transition: var(--transition); }

    /* Header */
    .header { padding: 1.5rem 1.5rem 0.5rem; display: flex; justify-content: space-between; align-items: flex-start; }
    .logo { font-family: 'DM Serif Display', serif; font-size: 28px; color: #2d5a3d; }
    .logo span { font-style: italic; color: #7fb069; }
    .avatar { width: 40px; height: 40px; border-radius: 50%; background: #2d5a3d; display: flex; align-items: center; justify-content: center; color: #f7f4ee; font-size: 14px; font-weight: 500; }

    /* Sky arc */
    .sky-arc-wrap { padding: 0 1.5rem; margin-bottom: 0; }
    .sky-arc-svg { width: 100%; display: block; overflow: visible; opacity: 0.85; }

    /* Page title */
    .page-title { padding: 0.75rem 1.5rem 1.25rem; }
    .page-title p { font-size: 13px; color: var(--text-muted); margin-bottom: 4px; }
    .page-title h1 { font-family: 'DM Serif Display', serif; font-size: 24px; font-weight: 400; color: var(--text-primary); }

    /* Section label */
    .section-label { padding: 0 1.5rem; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--section-label); margin-bottom: 12px; }

    /* ── COURSE LIST VIEW ── */
    #course-list { padding: 0 1.5rem; display: flex; flex-direction: column; gap: 14px; margin-bottom: 1.5rem; }

    .course-card {
      background: var(--bg-card);
      border-radius: 20px;
      border: 1px solid var(--card-border);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .course-card:active { transform: scale(0.98); }
    .course-card-banner {
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      position: relative;
      overflow: hidden;
    }
    .course-card-banner::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.08);
    }
    .course-card-body { padding: 1rem; }
    .course-tag { font-size: 10px; padding: 2px 8px; border-radius: 100px; font-weight: 500; display: inline-block; margin-bottom: 7px; }
    .course-title { font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 4px; line-height: 1.3; }
    .course-meta { font-size: 11px; color: var(--text-muted); margin-bottom: 10px; }
    .course-progress-wrap { margin-bottom: 2px; }
    .course-progress-bar-bg { background: rgba(0,0,0,0.07); border-radius: 100px; height: 6px; }
    .course-progress-bar-fill { height: 6px; border-radius: 100px; background: #7fb069; transition: width 0.5s ease; }
    .course-progress-label { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-muted); margin-top: 5px; }

    /* ── LESSON VIEW ── */
    #lesson-view { display: none; }

    .lesson-top-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 1.5rem;
      margin-bottom: 1rem;
    }
    .back-btn {
      background: var(--bg-card);
      border: 1px solid var(--card-border);
      border-radius: 50%;
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 16px;
      color: var(--text-primary);
      flex-shrink: 0;
    }
    .lesson-course-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Overall progress bar */
    .lesson-overall-progress {
      padding: 0 1.5rem;
      margin-bottom: 1.25rem;
    }
    .lop-label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; display: flex; justify-content: space-between; }
    .lop-bar-bg { background: rgba(0,0,0,0.07); border-radius: 100px; height: 6px; }
    .lop-bar-fill { height: 6px; border-radius: 100px; background: #7fb069; transition: width 0.5s ease; }

    /* Step dots */
    .step-dots {
      display: flex;
      gap: 6px;
      padding: 0 1.5rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }
    .step-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--card-border);
      transition: background 0.3s ease, transform 0.2s ease;
      flex-shrink: 0;
    }
    .step-dot.done { background: #7fb069; }
    .step-dot.active { background: #2d5a3d; transform: scale(1.4); }

    /* Lesson card */
    .lesson-card {
      margin: 0 1.5rem 1.25rem;
      background: var(--bg-card);
      border-radius: 20px;
      border: 1px solid var(--card-border);
      overflow: hidden;
      transition: background 0.6s ease;
      animation: cardIn 0.3s ease;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .lesson-card-header {
      padding: 1.25rem 1.25rem 1rem;
      border-bottom: 1px solid var(--card-border);
    }
    .lesson-step-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--section-label);
      margin-bottom: 6px;
    }
    .lesson-card-title {
      font-family: 'DM Serif Display', serif;
      font-size: 18px;
      font-weight: 400;
      color: var(--text-primary);
      line-height: 1.3;
    }

    .lesson-card-body { padding: 1.25rem; }

    /* Content types */
    .lesson-text {
      font-size: 13px;
      color: var(--text-primary);
      line-height: 1.7;
      margin-bottom: 1rem;
    }
    .lesson-text:last-child { margin-bottom: 0; }

    .lesson-highlight {
      background: #eef5eb;
      border-left: 3px solid #7fb069;
      border-radius: 0 10px 10px 0;
      padding: 10px 14px;
      margin: 0.75rem 0;
      font-size: 12px;
      color: #2d5a3d;
      line-height: 1.6;
    }
    body.theme-evening .lesson-highlight {
      background: rgba(127,176,105,0.1);
      color: #a8d890;
    }

    .lesson-callout {
      background: #faeeda;
      border-radius: 12px;
      padding: 12px 14px;
      margin: 0.75rem 0;
      font-size: 12px;
      color: #854f0b;
      line-height: 1.6;
      display: flex;
      gap: 8px;
    }
    body.theme-evening .lesson-callout {
      background: rgba(232,160,48,0.12);
      color: #e8c080;
    }
    .callout-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

    .lesson-stat-row {
      display: flex;
      gap: 8px;
      margin: 0.75rem 0;
    }
    .lesson-stat {
      flex: 1;
      background: var(--bg-featured);
      border-radius: 12px;
      padding: 10px 12px;
      text-align: center;
    }
    .lesson-stat-value {
      font-family: 'DM Serif Display', serif;
      font-size: 18px;
      color: #2d5a3d;
      display: block;
    }
    .lesson-stat-label {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ── QUIZ ── */
    .quiz-wrap { padding: 0 1.5rem 1.25rem; animation: cardIn 0.3s ease; }
    .quiz-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--section-label);
      margin-bottom: 8px;
    }
    .quiz-question {
      font-family: 'DM Serif Display', serif;
      font-size: 17px;
      font-weight: 400;
      color: var(--text-primary);
      margin-bottom: 1rem;
      line-height: 1.4;
    }
    .quiz-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1rem; }
    .quiz-option {
      background: var(--bg-card);
      border: 1.5px solid var(--card-border);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 13px;
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: border-color 0.2s, background 0.2s;
      font-family: 'DM Sans', sans-serif;
      text-align: left;
      width: 100%;
    }
    .quiz-option:hover:not(:disabled) { border-color: #7fb069; background: var(--bg-featured); }
    .quiz-option.correct { border-color: #7fb069; background: #eef5eb; color: #2d5a3d; }
    .quiz-option.wrong   { border-color: #fca5a5; background: #fef2f2; color: #c0392b; }
    body.theme-evening .quiz-option.correct { background: rgba(127,176,105,0.12); }
    body.theme-evening .quiz-option.wrong   { background: rgba(192,57,43,0.12); }
    .option-letter {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: var(--bg-featured);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      font-weight: 500;
      flex-shrink: 0;
    }
    .quiz-option.correct .option-letter { background: #7fb069; color: white; }
    .quiz-option.wrong   .option-letter { background: #fca5a5; color: white; }

    .quiz-feedback {
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 1rem;
      display: none;
    }
    .quiz-feedback.show { display: block; animation: cardIn 0.3s ease; }
    .quiz-feedback.correct-fb { background: #eef5eb; color: #2d5a3d; border: 1px solid #c3e6b5; }
    .quiz-feedback.wrong-fb   { background: #fef2f2; color: #c0392b; border: 1px solid #fca5a5; }
    body.theme-evening .quiz-feedback.correct-fb { background: rgba(127,176,105,0.1); color: #a8d890; border-color: rgba(127,176,105,0.3); }
    body.theme-evening .quiz-feedback.wrong-fb   { background: rgba(192,57,43,0.1);  color: #f87171; border-color: rgba(192,57,43,0.3); }

    /* Nav buttons */
    .lesson-nav-row {
      padding: 0 1.5rem;
      display: flex;
      gap: 8px;
    }
    .lesson-next-btn {
      flex: 1;
      background: #2d5a3d;
      color: white;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }
    .lesson-next-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .lesson-next-btn:not(:disabled):hover { background: #3a7050; }
    .lesson-prev-btn {
      background: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 14px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      cursor: pointer;
    }

    /* Completion card */
    .completion-card {
      margin: 0 1.5rem 1.25rem;
      background: var(--wellness-bg);
      border-radius: 20px;
      padding: 2rem 1.5rem;
      color: white;
      text-align: center;
      position: relative;
      overflow: hidden;
      animation: cardIn 0.4s ease;
    }
    .completion-card::before {
      content: '';
      position: absolute;
      top: -50px; right: -50px;
      width: 180px; height: 180px;
      background: var(--wellness-orb);
      border-radius: 50%;
    }
    .completion-emoji { font-size: 48px; margin-bottom: 1rem; display: block; }
    .completion-title {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      margin-bottom: 8px;
      color: white;
    }
    .completion-sub { font-size: 13px; color: var(--wellness-label); line-height: 1.6; margin-bottom: 1.25rem; }
    .completion-btn {
      background: white;
      color: #2d5a3d;
      border: none;
      border-radius: 14px;
      padding: 12px 24px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    /* Nav */
    .nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 420px; background: var(--nav-bg); border-top: 1px solid var(--nav-border); display: flex; justify-content: space-around; padding: 12px 0 20px; z-index: 100; transition: background 0.6s ease; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; opacity: 0.4; text-decoration: none; }
    .nav-item.active { opacity: 1; }
    .nav-label { font-size: 10px; color: var(--text-primary); }
    .nav-item.active .nav-label { color: #2d5a3d; font-weight: 500; }

    .page-footer { text-align: center; padding: 0 0 1.5rem; font-size: 11px; color: var(--footer); }
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo">BL<span>OOM</span></div>
    <div class="avatar">EC</div>
  </div>

  <!-- Sky arc -->
  <div class="sky-arc-wrap">
    <svg class="sky-arc-svg" viewBox="0 0 340 52" xmlns="http://www.w3.org/2000/svg">
      <line x1="0" y1="48" x2="340" y2="48" stroke-width="1" stroke-linecap="round" id="horizon-line"/>
      <path id="arc-path" d="M 20 48 A 150 42 0 0 1 320 48" fill="none" stroke-width="1" stroke-dasharray="3 5" stroke-linecap="round"/>
      <g id="stars" opacity="0">
        <circle cx="60" cy="12" r="1" fill="white" opacity="0.7"/>
        <circle cx="110" cy="5" r="0.8" fill="white" opacity="0.5"/>
        <circle cx="170" cy="9" r="1.1" fill="white" opacity="0.8"/>
        <circle cx="230" cy="4" r="0.8" fill="white" opacity="0.6"/>
        <circle cx="280" cy="13" r="1" fill="white" opacity="0.7"/>
        <circle cx="145" cy="20" r="0.7" fill="white" opacity="0.5"/>
        <circle cx="255" cy="22" r="0.7" fill="white" opacity="0.5"/>
      </g>
      <g id="sky-body">
        <circle id="sky-glow" cx="0" cy="0" r="10" opacity="0.25"/>
        <circle id="sky-circle" cx="0" cy="0" r="7"/>
        <g id="moon-detail" opacity="0">
          <circle cx="2.5" cy="-2" r="1.6" fill="rgba(0,0,0,0.1)"/>
          <circle cx="-2" cy="2" r="1.2" fill="rgba(0,0,0,0.08)"/>
        </g>
        <g id="sun-rays" stroke-width="1.2" stroke-linecap="round">
          <line x1="0" y1="-11" x2="0" y2="-14"/>
          <line x1="8" y1="-8" x2="10" y2="-10"/>
          <line x1="11" y1="0" x2="14" y2="0"/>
          <line x1="8" y1="8" x2="10" y2="10"/>
          <line x1="0" y1="11" x2="0" y2="14"/>
          <line x1="-8" y1="8" x2="-10" y2="10"/>
          <line x1="-11" y1="0" x2="-14" y2="0"/>
          <line x1="-8" y1="-8" x2="-10" y2="-10"/>
        </g>
      </g>
    </svg>
  </div>

  <!-- Course list view -->
  <div id="course-list-view">
    <div class="page-title">
      <p id="greeting-time">Good morning,</p>
      <h1>Learn 📚</h1>
    </div>

    <div class="section-label">Your courses</div>
    <div id="course-list"></div>
    <div class="page-footer">designed by @ethanchengluong</div>
  </div>

  <!-- Lesson view -->
  <div id="lesson-view">
    <div style="height: 0.75rem;"></div>
    <div class="lesson-top-bar">
      <button class="back-btn" onclick="goBack()">‹</button>
      <div class="lesson-course-title" id="lesson-course-title"></div>
    </div>
    <div class="lesson-overall-progress">
      <div class="lop-label">
        <span id="lop-text">Step 1 of 1</span>
        <span id="lop-pct">0%</span>
      </div>
      <div class="lop-bar-bg">
        <div class="lop-bar-fill" id="lop-fill" style="width:0%"></div>
      </div>
    </div>
    <div class="step-dots" id="step-dots"></div>
    <div id="lesson-content"></div>
    <div class="lesson-nav-row" id="lesson-nav-row">
      <button class="lesson-prev-btn" id="prev-btn" onclick="prevStep()">‹</button>
      <button class="lesson-next-btn" id="next-btn" onclick="nextStep()">Continue →</button>
    </div>
  </div>

</div>

  <a href="index.html" class="nav-item"><span>🏠</span><span class="nav-label">Home</span></a>
  <a href="learn.html" class="nav-item active"><span>📚</span><span class="nav-label">Learn</span></a>

<script>
  // ── Theme & sky arc ──────────────────────────────────────────────────────
  const hour = new Date().getHours();
  const minutes = new Date().getMinutes();
  const timeDecimal = hour + minutes / 60;
  const greeting = hour < 12 ? 'Good morning,' : hour < 17 ? 'Good afternoon,' : 'Good evening,';
  const theme = hour < 12 ? 'theme-morning' : hour < 17 ? 'theme-afternoon' : 'theme-evening';
  const greetingEl = document.getElementById('greeting-time');
  if (greetingEl) greetingEl.textContent = greeting;
  document.body.classList.add(theme);

  const RISE = 6, SET = 20;
  const isDay = timeDecimal >= RISE && timeDecimal < SET;
  let progress;
  if (isDay) { progress = (timeDecimal - RISE) / (SET - RISE); }
  else {
    const nightDur = 24 - (SET - RISE);
    const nightTime = timeDecimal >= SET ? timeDecimal - SET : timeDecimal + (24 - SET);
    progress = nightTime / nightDur;
  }
  const cx = 170, cy = 48, rx = 150, ry = 42;
  const angle = Math.PI - progress * Math.PI;
  const sx = cx + rx * Math.cos(angle), sy = cy - ry * Math.sin(angle);
  document.getElementById('sky-body').setAttribute('transform', `translate(${sx}, ${sy})`);
  const circle = document.getElementById('sky-circle');
  const glow   = document.getElementById('sky-glow');
  const rays   = document.getElementById('sun-rays');
  const moonDetail = document.getElementById('moon-detail');
  const stars      = document.getElementById('stars');
  const arcPath    = document.getElementById('arc-path');
  const horizonLine = document.getElementById('horizon-line');
  if (isDay) {
    const sunColor  = progress < 0.15 || progress > 0.85 ? '#f97316' : '#f59e0b';
    const glowColor = progress < 0.15 || progress > 0.85 ? '#fed7aa' : '#fde68a';
    circle.setAttribute('fill', sunColor); glow.setAttribute('fill', glowColor);
    rays.setAttribute('stroke', sunColor); rays.style.opacity = '1';
    moonDetail.style.opacity = '0'; stars.style.opacity = '0';
    arcPath.setAttribute('stroke', '#d4a830'); horizonLine.setAttribute('stroke', '#d4a830');
  } else {
    circle.setAttribute('fill', '#e8e0f0'); glow.setAttribute('fill', '#c8b8e8');
    rays.style.opacity = '0'; moonDetail.style.opacity = '1'; stars.style.opacity = '1';
    arcPath.setAttribute('stroke', '#6860a0'); horizonLine.setAttribute('stroke', '#6860a0');
  }

  // ── Course data ──────────────────────────────────────────────────────────
  const COURSES = [
    {
      id: 'loans-101',
      title: 'Student Loans 101',
      description: 'What loans are, types, and how interest works',
      emoji: '🏦',
      bannerColor: '#2d5a3d',
      tag: 'Start here',
      tagBg: '#eef5eb', tagColor: '#3b6d11',
      steps: [
        {
          type: 'lesson',
          title: 'What is a student loan?',
          content: `
            <p class="lesson-text">A <strong>student loan</strong> is money you borrow to help pay for college — tuition, housing, books, and living expenses. Unlike a scholarship or grant, you must pay it back, usually with interest.</p>
            <div class="lesson-highlight">💡 Think of a loan like borrowing your friend's notes — you have to give them back, and maybe a little extra as a thank-you.</div>

  // ── Progress storage ─────────────────────────────────────────────────────
  let courseProgress = JSON.parse(localStorage.getItem('bloom_learn_progress') || '{}');

  function getProgress(courseId) {
    return courseProgress[courseId] || { completed: [] };
  }
  function markStepDone(courseId, stepIdx) {
    if (!courseProgress[courseId]) courseProgress[courseId] = { completed: [] };
    if (!courseProgress[courseId].completed.includes(stepIdx)) {
      courseProgress[courseId].completed.push(stepIdx);
    }
    localStorage.setItem('bloom_learn_progress', JSON.stringify(courseProgress));
  }

  // ── Course list render ───────────────────────────────────────────────────
  function renderCourseList() {
    document.getElementById('course-list-view').style.display = '';
    document.getElementById('lesson-view').style.display = 'none';

    const listEl = document.getElementById('course-list');
    listEl.innerHTML = COURSES.map(course => {
      const prog = getProgress(course.id);
      const totalSteps = course.steps.length;
      const doneSteps  = prog.completed.length;
      const pct = Math.round(doneSteps / totalSteps * 100);
      const started = doneSteps > 0;
      const finished = doneSteps >= totalSteps;

      return `<div class="course-card" onclick="openCourse('${course.id}')">
        <div class="course-card-banner" style="background:${course.bannerColor};">
          <span style="font-size:40px; position:relative; z-index:1;">${course.emoji}</span>
        </div>
        <div class="course-card-body">
          <div class="course-tag" style="background:${course.tagBg};color:${course.tagColor};">${finished ? '✅ Completed' : started ? '▶ In progress' : course.tag}</div>
          <div class="course-title">${course.title}</div>
          <div class="course-meta">${course.steps.length} steps · ${course.steps.filter(s => s.type === 'quiz').length} quiz${course.steps.filter(s => s.type === 'quiz').length !== 1 ? 'zes' : ''}</div>
          <div class="course-progress-wrap">
            <div class="course-progress-bar-bg">
              <div class="course-progress-bar-fill" style="width:${pct}%;"></div>
            </div>
            <div class="course-progress-label">
              <span>${finished ? '🎉 Done!' : started ? (doneSteps + '/' + totalSteps + ' steps') : 'Not started'}</span>
              <span>${pct}%</span>
            </div>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  // ── Lesson engine ────────────────────────────────────────────────────────
  let activeCourse = null;
  let activeStep   = 0;
  let quizAnswered = false;

  function openCourse(courseId) {
    window.location.href = 'course.html?id=' + courseId;
  }

  function goBack() {
    activeCourse = null;
    renderCourseList();
  }

  function renderStep() {
    if (!activeCourse) return;
    const steps     = activeCourse.steps;
    const totalSteps = steps.length;
    const step      = steps[activeStep];
    const prog      = getProgress(activeCourse.id);
    quizAnswered    = false;

    // Progress bar
    const doneSoFar = Math.min(activeStep, prog.completed.length);
    const pct       = Math.round((activeStep) / totalSteps * 100);
    document.getElementById('lop-text').textContent = `Step ${activeStep + 1} of ${totalSteps}`;
    document.getElementById('lop-pct').textContent  = pct + '%';
    document.getElementById('lop-fill').style.width = pct + '%';

    // Step dots
    const dotsEl = document.getElementById('step-dots');
    dotsEl.innerHTML = steps.map((_, i) => {
      let cls = 'step-dot';
      if (prog.completed.includes(i)) cls += ' done';
      if (i === activeStep) cls += ' active';
      return `<div class="${cls}"></div>`;
    }).join('');

    // Content
    const contentEl = document.getElementById('lesson-content');

    if (step.type === 'lesson') {
      contentEl.innerHTML = `
        <div class="lesson-card">
          <div class="lesson-card-header">
            <div class="lesson-step-label">Step ${activeStep + 1} · ${activeCourse.title}</div>
            <div class="lesson-card-title">${step.title}</div>
          </div>
          <div class="lesson-card-body">${step.content}</div>
        </div>`;

      const nextBtn = document.getElementById('next-btn');
      const prevBtn = document.getElementById('prev-btn');
      nextBtn.disabled = false;
      nextBtn.textContent = activeStep === totalSteps - 1 ? 'Finish 🎉' : 'Continue →';
      prevBtn.style.display = activeStep === 0 ? 'none' : '';
    }

    if (step.type === 'quiz') {
      const letters = ['A', 'B', 'C', 'D'];
      contentEl.innerHTML = `
        <div class="quiz-wrap">
          <div class="quiz-label">Quick Check · Step ${activeStep + 1}</div>
          <div class="quiz-question">${step.question}</div>
          <div class="quiz-options" id="quiz-options">
            ${step.options.map((opt, i) => `
              <button class="quiz-option" onclick="answerQuiz(${i})" id="opt-${i}">
                <div class="option-letter">${letters[i]}</div>
                ${opt}
              </button>`).join('')}
          </div>
          <div class="quiz-feedback" id="quiz-feedback"></div>
        </div>`;

      const nextBtn = document.getElementById('next-btn');
      const prevBtn = document.getElementById('prev-btn');
      nextBtn.disabled = true;
      nextBtn.textContent = activeStep === totalSteps - 1 ? 'Finish 🎉' : 'Continue →';
      prevBtn.style.display = activeStep === 0 ? 'none' : '';
    }

    // Check if already done
    if (prog.completed.includes(activeStep) && step.type === 'quiz') {
      // re-enable continue for already-answered quiz
      document.getElementById('next-btn').disabled = false;
    }
  }

  function answerQuiz(chosen) {
    if (quizAnswered) return;
    quizAnswered = true;
    const step    = activeCourse.steps[activeStep];
    const correct = step.correct;
    const isRight = chosen === correct;

    // Style options
    const opts = document.querySelectorAll('.quiz-option');
    opts.forEach((btn, i) => {
      btn.disabled = true;
      if (i === correct) btn.classList.add('correct');
      else if (i === chosen) btn.classList.add('wrong');
    });

    // Feedback
    const fb = document.getElementById('quiz-feedback');
    fb.className = `quiz-feedback show ${isRight ? 'correct-fb' : 'wrong-fb'}`;
    fb.textContent = isRight ? step.feedback.correct : step.feedback.wrong;

    // Enable next
    document.getElementById('next-btn').disabled = false;

    // Mark done
    markStepDone(activeCourse.id, activeStep);
  }

  function nextStep() {
    const steps = activeCourse.steps;
    markStepDone(activeCourse.id, activeStep);

    if (activeStep >= steps.length - 1) {
      showCompletion();
    } else {
      activeStep++;
      renderStep();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  }

  function prevStep() {
    if (activeStep > 0) {
      activeStep--;
      renderStep();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  }

  function showCompletion() {
    const contentEl = document.getElementById('lesson-content');
    contentEl.innerHTML = `
      <div class="completion-card">
        <span class="completion-emoji">🌸</span>
        <div class="completion-title">Course complete!</div>
        <div class="completion-sub">You finished <strong>${activeCourse.title}</strong>. Keep growing your financial knowledge — every lesson gets you closer to financial confidence.</div>
        <button class="completion-btn" onclick="goBack()">Back to courses</button>
      </div>`;
    document.getElementById('lesson-nav-row').style.display = 'none';
    document.getElementById('step-dots').innerHTML = '';
    document.getElementById('lop-fill').style.width = '100%';
    document.getElementById('lop-pct').textContent = '100%';
    document.getElementById('lop-text').textContent = 'Completed!';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── Init ─────────────────────────────────────────────────────────────────
  renderCourseList();
</script>
</body>
</html>
